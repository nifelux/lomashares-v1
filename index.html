  <p>Loading...</p>

  <script>
    async function bootIndexRedirect() {
      try {
        if (!window.sb) {
          setTimeout(bootIndexRedirect, 300);
          return;
        }

        const { data, error } = await window.sb.auth.getSession();

        if (error) {
          window.location.href = "/login.html";
          return;
        }

        const session = data?.session || null;

        if (session?.user) {
          window.location.href = "/dashboard.html";
        } else {
          window.location.href = "/login.html";
        }
      } catch (err) {
        console.error("Index redirect error:", err);
        window.location.href = "/login.html";
      }
    }

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", bootIndexRedirect);
    } else {
      bootIndexRedirect();
    }
  </script>
