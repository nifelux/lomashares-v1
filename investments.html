<h2>My Investments</h2>

<div id="investments"></div>

<script>

async function loadInvestments(){

const session=await window.LomaAuth.requireAuth()
const userId=session.user.id

const {data,error}=await sb
.from("investments")
.select(`
*,
investment_plans(name)
`)
.eq("user_id",userId)
.order("created_at",{ascending:false})

if(error){
console.log(error)
return
}

const box=document.getElementById("investments")

box.innerHTML=data.map(i=>`

<div class="card">

<h3>${i.investment_plans?.name}</h3>

<p>Amount: ₦${i.amount}</p>

<p>Daily Profit: ₦${i.daily_profit}</p>

<p>Progress: ${i.days_paid}/${i.duration_days}</p>

<p>Status: ${i.status}</p>

</div>

`).join("")

}

document.addEventListener("DOMContentLoaded",loadInvestments)
