<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Transactions | LomaShares</title>
  <link rel="stylesheet" href="assets/css/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/supabase.js"></script>
  <script src="assets/js/auth.js"></script>
</head>
<body
  data-page="user"
  data-supabase-url="YOUR_SUPABASE_URL"
  data-supabase-anon="YOUR_SUPABASE_ANON_KEY"
>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">LomaShares</div>
      <nav class="nav-menu">
        <a class="nav-link" href="dashboard.html">Dashboard</a>
        <a class="nav-link" href="deposit.html">Deposit</a>
        <a class="nav-link" href="invest.html">Invest</a>
        <a class="nav-link" href="investments.html">My Investments</a>
        <a class="nav-link" href="withdraw.html">Withdraw</a>
        <a class="nav-link active" href="transactions.html">Transactions</a>
        <a class="nav-link" href="referrals.html">Referrals</a>
        <a class="nav-link" href="team.html">Team</a>
        <a class="nav-link" href="gift.html">Gift Code</a>
        <a class="nav-link" href="profile.html">Profile</a>
      </nav>
      <button class="logout-btn" data-action="logout">Logout</button>
    </aside>

    <main class="main-content">
      <header class="topbar">
        <div>
          <h1>Transactions</h1>
          <p>Your wallet transaction history only</p>
        </div>
      </header>

      <div id="msg" class="msg"></div>

      <div class="panel">
        <div class="panel-head">
          <h2>Transaction History</h2>
        </div>
        <div id="txList" class="list-wrap">
          <p class="empty-state">Loading transactions...</p>
        </div>
      </div>
    </main>
  </div>

  <script>
    (function () {
      "use strict";

      function money(v) {
        return "₦" + Number(v || 0).toLocaleString(undefined, {
          minimumFractionDigits: 2,
          maximumFractionDigits: 2
        });
      }

      function showMessage(text, type = "error") {
        const box = document.getElementById("msg");
        box.textContent = text;
        box.className = "msg " + type;
        box.style.display = "block";
      }

      async function loadTransactions() {
        try {
          const session = await window.LomaAuth.requireAuth();
          if (!session) return;

          const userId = session.user.id;

          const { data, error } = await sb
            .from("wallet_transactions")
            .select("*")
            .eq("user_id", userId)
            .order("created_at", { ascending: false });

          if (error) throw error;

          const wrap = document.getElementById("txList");

          if (!data || !data.length) {
            wrap.innerHTML = '<p class="empty-state">No transactions found.</p>';
            return;
          }

          wrap.innerHTML = data.map((t) => `
            <div class="list-item">
              <div>
                <strong>${t.type || "Transaction"}</strong>
                <p>${t.description || "-"}</p>
                <p>Reference: ${t.reference || "-"}</p>
                <p>${new Date(t.created_at).toLocaleString()}</p>
              </div>
              <div class="list-item-right">
                <strong>${t.direction === "credit" ? "+" : "-"}${money(t.amount)}</strong>
                <span class="status-pill ${t.direction === "credit" ? "credit" : "debit"}">${t.status || "completed"}</span>
              </div>
            </div>
          `).join("");
        } catch (err) {
          console.error(err);
          showMessage(err.message || "Failed to load transactions.");
        }
      }

      document.addEventListener("DOMContentLoaded", loadTransactions);
    })();
  </script>
</body>
        </html>
