<h2>Withdraw</h2>

<form id="withdrawForm">

<input id="amount" placeholder="Amount">

<input id="bank_name" placeholder="Bank Name">

<input id="account_name" placeholder="Account Name">

<input id="account_number" placeholder="Account Number">

<button type="submit">Submit</button>

</form>

<div id="msg"></div>

<script>

document.getElementById("withdrawForm").addEventListener("submit",async e=>{

e.preventDefault()

const session=await window.LomaAuth.requireAuth()

const userId=session.user.id

const amount=document.getElementById("amount").value

const bank=document.getElementById("bank_name").value

const accName=document.getElementById("account_name").value

const accNum=document.getElementById("account_number").value

const {data,error}=await sb.rpc("request_withdrawal",{

p_user_id:userId,
p_amount:amount,
p_bank_name:bank,
p_account_name:accName,
p_account_number:accNum

})

if(error||!data.ok){

document.getElementById("msg").innerText=data?.error||"Error"

return

}

document.getElementById("msg").innerText="Withdrawal submitted"

})

</script>
