<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Withdraw | LomaShares</title>
  <link rel="stylesheet" href="assets/css/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
  <script src="assets/js/supabase.js" defer></script>
  <script src="assets/js/auth.js" defer></script>
  <script src="assets/js/withdrawals.js" defer></script>
</head>
<body
  data-page="user"
  data-supabase-url="YOUR_SUPABASE_URL"
  data-supabase-anon="YOUR_SUPABASE_ANON_KEY"
>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">LomaShares</div>
      <nav class="nav-menu">
        <a class="nav-link" href="dashboard.html">Dashboard</a>
        <a class="nav-link" href="deposit.html">Deposit</a>
        <a class="nav-link" href="invest.html">Invest</a>
        <a class="nav-link" href="investments.html">My Investments</a>
        <a class="nav-link active" href="withdraw.html">Withdraw</a>
        <a class="nav-link" href="transactions.html">Transactions</a>
        <a class="nav-link" href="referrals.html">Referrals</a>
        <a class="nav-link" href="team.html">Team</a>
        <a class="nav-link" href="gift.html">Gift Code</a>
        <a class="nav-link" href="profile.html">Profile</a>
      </nav>
      <button class="logout-btn" data-action="logout">Logout</button>
    </aside>

    <main class="main-content">
      <header class="topbar">
        <div>
          <h1>Withdraw</h1>
          <p>Submit a withdrawal request to your bank account</p>
        </div>
      </header>

      <div id="msg" class="msg"></div>

      <div class="panel" style="max-width:600px;">
        <div class="panel-head">
          <h2>Withdrawal Request</h2>
        </div>

        <form id="withdrawForm" class="simple-form">
          <input id="amount" type="number" min="500" step="0.01" placeholder="Amount" required />

          <select id="bank" required>
            <option value="">Loading banks...</option>
          </select>

          <input id="account_name" type="text" placeholder="Account Name" required />
          <input id="account_number" type="text" placeholder="Account Number" required />

          <button type="submit">Submit Withdrawal</button>
        </form>

        <p class="empty-state">Minimum withdrawal: ₦500.00</p>
      </div>
    </main>
  </div>
</body>
</html>
