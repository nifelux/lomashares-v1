    <main class="main-content">
      <header class="topbar">
        <div>
          <h1>Profile</h1>
          <p>Manage your account details</p>
        </div>
      </header>

      <div id="msg" class="msg"></div>

      <div class="panel" style="max-width:650px;">
        <div class="panel-head">
          <h2>My Profile</h2>
        </div>

        <form id="profileForm" class="simple-form">
          <input id="full_name" type="text" placeholder="Full Name" />
          <input id="email" type="email" placeholder="Email" disabled />
          <input id="phone" type="text" placeholder="Phone Number" />
          <input id="state" type="text" placeholder="State" />
          <input id="lga" type="text" placeholder="LGA" />
          <input id="username" type="text" placeholder="Username" />
          <input id="referral_code" type="text" placeholder="Referral Code" disabled />
          <input id="role" type="text" placeholder="Role" disabled />
          <button type="submit">Save Profile</button>
        </form>
      </div>
    </main>
  </div>

  <script>
    (function () {
      "use strict";

      function showMessage(text, type = "error") {
        const box = document.getElementById("msg");
        box.textContent = text;
        box.className = "msg " + type;
        box.style.display = "block";
      }

      async function loadProfile() {
        try {
          const session = await window.LomaAuth.requireAuth();
          if (!session) return;

          const userId = session.user.id;
          const profile = await window.LomaAuth.getProfile(userId);

          document.getElementById("full_name").value = profile.full_name || "";
          document.getElementById("email").value = profile.email || session.user.email || "";
          document.getElementById("phone").value = profile.phone || "";
          document.getElementById("state").value = profile.state || "";
          document.getElementById("lga").value = profile.lga || "";
          document.getElementById("username").value = profile.username || "";
          document.getElementById("referral_code").value = profile.referral_code || "";
          document.getElementById("role").value = profile.role || "user";
        } catch (err) {
          console.error(err);
          showMessage(err.message || "Failed to load profile.");
        }
      }

      document.getElementById("profileForm")?.addEventListener("submit", async function (e) {
        e.preventDefault();

        try {
          const session = await window.LomaAuth.requireAuth();
          if (!session) return;

          const userId = session.user.id;

          const payload = {
            full_name: document.getElementById("full_name").value.trim() || null,
            phone: document.getElementById("phone").value.trim() || null,
            state: document.getElementById("state").value.trim() || null,
            lga: document.getElementById("lga").value.trim() || null,
            username: document.getElementById("username").value.trim() || null
          };

          const { error } = await sb
            .from("profiles")
            .update(payload)
            .eq("id", userId);

          if (error) throw error;

          showMessage("Profile updated successfully.", "success");
        } catch (err) {
          console.error(err);
          showMessage(err.message || "Failed to update profile.");
        }
      });

      document.addEventListener("DOMContentLoaded", loadProfile);
    })();
  </script>
