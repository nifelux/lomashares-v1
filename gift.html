<h2>Redeem Gift Code</h2>

<input id="code" placeholder="Enter Code">

<button onclick="redeem()">Redeem</button>

<div id="msg"></div>

<script>

async function redeem(){

const session=await window.LomaAuth.requireAuth()

const userId=session.user.id

const code=document.getElementById("code").value

const {data,error}=await sb.rpc("redeem_gift_code",{

p_user_id:userId,
p_code:code

})

if(error||!data.ok){

document.getElementById("msg").innerText=data?.error||"Invalid code"
return

}

document.getElementById("msg").innerText="₦"+data.amount+" credited"

}

</script>
