<body
  data-page="admin"
  data-role="admin"
  data-supabase-url="https://yrrjadpzaesqxvclflwt.supabase.co"
  data-supabase-anon="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlycmphZHB6YWVzcXh2Y2xmbHd0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4MzExMzksImV4cCI6MjA4ODQwNzEzOX0.3rwLwVdrfjLIL9o-mFldpUgEUsbEINx1GTTMUt416g4"
>
  <div class="main-content">
    <h1>Deposits</h1>
    <div id="msg" class="msg"></div>
    <div id="depositsList"></div>
  </div>

  <script>
    async function loadDeposits() {
      try {
        await window.LomaAuth.requireRole("admin");

        const { data, error } = await sb
          .from("deposits")
          .select("id, user_id, amount, payment_method, paystack_reference, status, paid_at, created_at")
          .order("created_at", { ascending: false });

        if (error) throw error;

        document.getElementById("depositsList").innerHTML = data.map(item => `
          <div class="list-item">
            <div>
              <strong>${item.paystack_reference || "Deposit"}</strong>
              <p>User: ${item.user_id}</p>
              <p>Method: ${item.payment_method || "-"}</p>
            </div>
            <div class="list-item-right">
              <p>₦${Number(item.amount).toLocaleString()}</p>
              <p>${item.status}</p>
              <p>${new Date(item.created_at).toLocaleString()}</p>
            </div>
          </div>
        `).join("");
      } catch (err) {
        const m = document.getElementById("msg");
        m.textContent = err.message || "Failed to load deposits.";
        m.className = "msg error";
        m.style.display = "block";
      }
    }

    document.addEventListener("DOMContentLoaded", loadDeposits);
  </script>
</body>
