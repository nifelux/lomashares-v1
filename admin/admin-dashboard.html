  <script>
    function showMessage(message, type = "error") {
      const box = document.getElementById("msg");
      box.textContent = message;
      box.className = "msg " + type;
      box.style.display = "block";
    }

    async function loadStats() {
      try {
        await window.LomaAuth.requireRole("admin");

        const [{ count: usersCount, error: e1 }, { count: invCount, error: e2 }, { count: wdCount, error: e3 }, { count: depCount, error: e4 }] = await Promise.all([
          sb.from("profiles").select("*", { count: "exact", head: true }),
          sb.from("investments").select("*", { count: "exact", head: true }).eq("status", "active"),
          sb.from("withdrawals").select("*", { count: "exact", head: true }).eq("status", "pending"),
          sb.from("deposits").select("*", { count: "exact", head: true }).eq("status", "pending")
        ]);

        if (e1 || e2 || e3 || e4) throw (e1 || e2 || e3 || e4);

        document.getElementById("totalUsers").textContent = usersCount || 0;
        document.getElementById("activeInvestments").textContent = invCount || 0;
        document.getElementById("pendingWithdrawals").textContent = wdCount || 0;
        document.getElementById("pendingDeposits").textContent = depCount || 0;
      } catch (err) {
        console.error(err);
        showMessage(err.message || "Failed to load admin stats.");
      }
    }

    document.addEventListener("DOMContentLoaded", loadStats);
  </script>
