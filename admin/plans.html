<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plans | LomaShares Admin</title>
  <link rel="stylesheet" href="../assets/css/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
  <script src="../assets/js/supabase.js" defer></script>
  <script src="../assets/js/auth.js" defer></script>
</head>
<body
  data-page="admin"
  data-role="admin"
  data-supabase-url="https://yrrjadpzaesqxvclflwt.supabase.co"
  data-supabase-anon="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlycmphZHB6YWVzcXh2Y2xmbHd0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4MzExMzksImV4cCI6MjA4ODQwNzEzOX0.3rwLwVdrfjLIL9o-mFldpUgEUsbEINx1GTTMUt416g4"
>
  <div class="main-content">
    <h1>Investment Plans</h1>
    <div id="msg" class="msg"></div>

    <form id="planForm" class="simple-form">
      <input id="plan_id" type="hidden" />
      <input id="name" placeholder="Plan Name" required />
      <input id="code" placeholder="Code" required />
      <input id="price" type="number" step="0.01" placeholder="Price" required />
      <input id="daily_profit" type="number" step="0.01" placeholder="Daily Profit" required />
      <input id="duration_days" type="number" placeholder="Duration Days" required />
      <input id="total_return" type="number" step="0.01" placeholder="Total Return" required />
      <input id="max_investments" type="number" min="1" placeholder="Maximum investments per user" value="1" required />
      <input id="sort_order" type="number" placeholder="Sort Order" value="0" />
      <textarea id="description" placeholder="Description"></textarea>
      <button id="saveBtn" type="submit">Create Plan</button>
    </form>

    <div id="plansList"></div>
  </div>

  <script>
    function msg(text, type = "error") {
      const m = document.getElementById("msg");
      m.textContent = text;
      m.className = "msg " + type;
      m.style.display = "block";
    }

    function clearForm() {
      document.getElementById("planForm").reset();
      document.getElementById("plan_id").value = "";
      document.getElementById("sort_order").value = 0;
      document.getElementById("max_investments").value = 1;
      document.getElementById("saveBtn").textContent = "Create Plan";
    }

    async function loadPlans() {
      const { data, error } = await window.sb
        .from("investment_plans")
        .select("*")
        .order("sort_order", { ascending: true });

      if (error) throw error;

      document.getElementById("plansList").innerHTML = (data || []).map(plan => `
        <div class="list-item">
          <div>
            <strong>${plan.name}</strong>
            <p>Code: ${plan.code}</p>
            <p>${plan.description || ""}</p>
          </div>

          <div class="list-item-right">
            <p>Price: ₦${Number(plan.price || 0).toLocaleString()}</p>
            <p>Profit: ₦${Number(plan.daily_profit || 0).toLocaleString()}/day</p>
            <p>${plan.duration_days} days</p>
            <p>Total Return: ₦${Number(plan.total_return || 0).toLocaleString()}</p>
            <p>Max/User: ${plan.max_investments ?? 1}</p>
            <p>${plan.is_active ? "Active" : "Inactive"}</p>
            <button type="button" onclick="editPlan('${plan.id}')">Edit</button>
            <button type="button" onclick="togglePlanStatus('${plan.id}', ${!plan.is_active})">
              ${plan.is_active ? "Deactivate" : "Activate"}
            </button>
          </div>
        </div>
      `).join("");
    }

    async function editPlan(planId) {
      try {
        await window.LomaAuth.requireRole("admin");

        const { data, error } = await window.sb
          .from("investment_plans")
          .select("*")
          .eq("id", planId)
          .single();

        if (error) throw error;

        document.getElementById("plan_id").value = data.id;
        document.getElementById("name").value = data.name || "";
        document.getElementById("code").value = data.code || "";
        document.getElementById("price").value = data.price || "";
        document.getElementById("daily_profit").value = data.daily_profit || "";
        document.getElementById("duration_days").value = data.duration_days || "";
        document.getElementById("total_return").value = data.total_return || "";
        document.getElementById("max_investments").value = data.max_investments ?? 1;
        document.getElementById("sort_order").value = data.sort_order ?? 0;
        document.getElementById("description").value = data.description || "";
        document.getElementById("saveBtn").textContent = "Update Plan";

        window.scrollTo({ top: 0, behavior: "smooth" });
      } catch (err) {
        console.error(err);
        msg(err.message || "Failed to load plan.");
      }
    }

    async function togglePlanStatus(planId, nextStatus) {
      try {
        await window.LomaAuth.requireRole("admin");

        const yes = confirm(`Are you sure you want to ${nextStatus ? "activate" : "deactivate"} this plan?`);
        if (!yes) return;

        const { error } = await window.sb
          .from("investment_plans")
          .update({ is_active: nextStatus })
          .eq("id", planId);

        if (error) throw error;

        msg(`Plan ${nextStatus ? "activated" : "deactivated"} successfully.`, "success");
        await loadPlans();
      } catch (err) {
        console.error(err);
        msg(err.message || "Failed to update plan status.");
      }
    }

    window.editPlan = editPlan;
    window.togglePlanStatus = togglePlanStatus;

    document.getElementById("planForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      try {
        await window.LomaAuth.requireRole("admin");

        const planId = document.getElementById("plan_id").value || null;

        const payload = {
          name: document.getElementById("name").value.trim(),
          code: document.getElementById("code").value.trim().toUpperCase(),
          price: Number(document.getElementById("price").value),
          daily_profit: Number(document.getElementById("daily_profit").value),
          duration_days: Number(document.getElementById("duration_days").value),
          total_return: Number(document.getElementById("total_return").value),
          max_investments: Number(document.getElementById("max_investments").value || 1),
          sort_order: Number(document.getElementById("sort_order").value || 0),
          description: document.getElementById("description").value.trim() || null
        };

        if (!payload.name) throw new Error("Plan name is required.");
        if (!payload.code) throw new Error("Plan code is required.");
        if (payload.price <= 0) throw new Error("Price must be greater than 0.");
        if (payload.daily_profit <= 0) throw new Error("Daily profit must be greater than 0.");
        if (payload.duration_days <= 0) throw new Error("Duration days must be greater than 0.");
        if (payload.total_return <= 0) throw new Error("Total return must be greater than 0.");
        if (payload.max_investments <= 0) throw new Error("Maximum investments per user must be at least 1.");

        let error;

        if (planId) {
          const res = await window.sb
            .from("investment_plans")
            .update(payload)
            .eq("id", planId);

          error = res.error;
        } else {
          payload.is_active = true;

          const res = await window.sb
            .from("investment_plans")
            .insert(payload);

          error = res.error;
        }

        if (error) throw error;

        msg(planId ? "Plan updated successfully." : "Plan created successfully.", "success");
        clearForm();
        await loadPlans();
      } catch (err) {
        console.error(err);
        msg(err.message || "Failed to save plan.");
      }
    });

    document.addEventListener("DOMContentLoaded", async () => {
      try {
        await window.LomaAuth.requireRole("admin");
        clearForm();
        await loadPlans();
      } catch (err) {
        msg(err.message || "Failed to load plans.");
      }
    });
  </script>
</body>
</html>
