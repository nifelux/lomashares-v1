<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plans | LomaShares Admin</title>
  <link rel="stylesheet" href="../assets/css/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
<script src="../assets/js/supabase.js" defer></script>
<script src="../assets/js/auth.js" defer></script></head>
<body
  data-page="admin"
  data-role="admin"
  data-supabase-url="https://yrrjadpzaesqxvclflwt.supabase.co"
  data-supabase-anon="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlycmphZHB6YWVzcXh2Y2xmbHd0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4MzExMzksImV4cCI6MjA4ODQwNzEzOX0.3rwLwVdrfjLIL9o-mFldpUgEUsbEINx1GTTMUt416g4"
>
  <div class="main-content">
    <h1>Investment Plans</h1>
    <div id="msg" class="msg"></div>

    <form id="planForm" class="simple-form">
      <input id="name" placeholder="Plan Name" required />
      <input id="code" placeholder="Code" required />
      <input id="price" type="number" step="0.01" placeholder="Price" required />
      <input id="daily_profit" type="number" step="0.01" placeholder="Daily Profit" required />
      <input id="duration_days" type="number" placeholder="Duration Days" required />
      <input id="total_return" type="number" step="0.01" placeholder="Total Return" required />
      <input id="sort_order" type="number" placeholder="Sort Order" value="0" />
      <textarea id="description" placeholder="Description"></textarea>
      <button type="submit">Create Plan</button>
    </form>

    <div id="plansList"></div>
  </div>

  <script>
    function msg(text, type = "error") {
      const m = document.getElementById("msg");
      m.textContent = text;
      m.className = "msg " + type;
      m.style.display = "block";
    }

    async function loadPlans() {
      const { data, error } = await sb
        .from("investment_plans")
        .select("*")
        .order("sort_order", { ascending: true });

      if (error) throw error;

      document.getElementById("plansList").innerHTML = data.map(plan => `
        <div class="list-item">
          <div>
            <strong>${plan.name}</strong>
            <p>Code: ${plan.code}</p>
            <p>${plan.description || ""}</p>
          </div>
          <div class="list-item-right">
            <p>Price: ₦${Number(plan.price).toLocaleString()}</p>
            <p>Profit: ₦${Number(plan.daily_profit).toLocaleString()}/day</p>
            <p>${plan.duration_days} days</p>
            <p>${plan.is_active ? "Active" : "Inactive"}</p>
          </div>
        </div>
      `).join("");
    }

    document.getElementById("planForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      try {
        await window.LomaAuth.requireRole("admin");

        const payload = {
          name: document.getElementById("name").value.trim(),
          code: document.getElementById("code").value.trim().toUpperCase(),
          price: Number(document.getElementById("price").value),
          daily_profit: Number(document.getElementById("daily_profit").value),
          duration_days: Number(document.getElementById("duration_days").value),
          total_return: Number(document.getElementById("total_return").value),
          sort_order: Number(document.getElementById("sort_order").value || 0),
          description: document.getElementById("description").value.trim() || null,
          is_active: true
        };

        const { error } = await sb.from("investment_plans").insert(payload);
        if (error) throw error;

        msg("Plan created successfully.", "success");
        e.target.reset();
        loadPlans();
      } catch (err) {
        console.error(err);
        msg(err.message || "Failed to create plan.");
      }
    });

    document.addEventListener("DOMContentLoaded", async () => {
      try {
        await window.LomaAuth.requireRole("admin");
        await loadPlans();
      } catch (err) {
        msg(err.message || "Failed to load plans.");
      }
    });
  </script>
</body>
</html>
