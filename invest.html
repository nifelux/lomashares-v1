<script>
  (function () {
    "use strict";

    function money(v) {
      return "₦" + Number(v || 0).toLocaleString(undefined, {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      });
    }

    async function loadPlans() {
      const wrap = document.getElementById("plansWrap");
      if (!wrap) return;

      try {
        const session = await window.LomaAuth.requireAuth();
        if (!session) return;

        const { data, error } = await window.sb
          .from("investment_plans")
          .select("*")
          .eq("is_active", true)
          .order("min_amount", { ascending: true });

        if (error) throw error;

        if (!data || !data.length) {
          wrap.innerHTML = '<p class="empty-state">No investment plans available right now.</p>';
          return;
        }

        wrap.innerHTML = data.map((plan) => `
          <div class="plan-card">
            <h3>${plan.name || "Investment Plan"}</h3>
            <div class="plan-price">${money(plan.min_amount)}</div>

            <ul class="plan-details">
              <li>Total Return: <b>${money(plan.total_return || (Number(plan.min_amount || 0) * 2))}</b></li>
              <li>Daily Profit: <b>${money(plan.daily_profit)}</b></li>
              <li>Duration: <b>${plan.duration_days} days</b></li>
            </ul>

            <button type="button" onclick="buyPlan('${plan.id}')">Invest Now</button>
          </div>
        `).join("");
      } catch (err) {
        console.error("Load plans error:", err);
        wrap.innerHTML = `<p class="empty-state">${err.message || "Failed to load plans."}</p>`;
      }
    }

    document.addEventListener("DOMContentLoaded", loadPlans);
  })();
</script>
