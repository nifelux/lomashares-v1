<script>

function showMessage(msg,type="error"){

const box=document.getElementById("msg")

box.innerText=msg
box.className="msg "+type
box.style.display="block"

}


function formatMoney(v){

return "₦"+Number(v).toLocaleString(undefined,{
minimumFractionDigits:2
})

}


async function loadPlans(){

try{

const session=await window.LomaAuth.requireAuth()

if(!session)return

const {data,error}=await sb
.from("investment_plans")
.select("*")
.eq("is_active",true)
.order("sort_order")

if(error)throw error

renderPlans(data)

}catch(err){

console.error(err)
showMessage("Failed to load investment plans")

}

}



function renderPlans(plans){

const wrap=document.getElementById("plansContainer")

if(!plans.length){

wrap.innerHTML="<p>No plans available</p>"
return

}

wrap.innerHTML=plans.map(plan=>`

<div class="plan-card">

<h3>${plan.name}</h3>

<div class="plan-price">
${formatMoney(plan.price)}
</div>

<ul class="plan-details">

<li>Daily Profit: <b>${formatMoney(plan.daily_profit)}</b></li>

<li>Duration: <b>${plan.duration_days} days</b></li>

<li>Total Return: <b>${formatMoney(plan.total_return)}</b></li>

</ul>

<button onclick="buyPlan('${plan.id}')">
Invest Now
</button>

</div>

`).join("")

}



async function buyPlan(planId){

try{

const session=await window.LomaAuth.requireAuth()

if(!session)return

const userId=session.user.id

const confirmBuy=confirm("Proceed with this investment?")

if(!confirmBuy)return

const {data,error}=await sb.rpc(
"create_investment",
{
p_user_id:userId,
p_plan_id:planId
}
)

if(error)throw error

if(!data.ok){

showMessage(data.error)
return

}

showMessage("Investment successful","success")

setTimeout(()=>{

window.location.href="investments.html"

},1000)

}catch(err){

console.error(err)
showMessage("Investment failed")

}

}



document.addEventListener("DOMContentLoaded",loadPlans)

</script>
